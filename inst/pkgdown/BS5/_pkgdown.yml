template:
  bslib:
    brand: docs/_brand/_brand.yml
  includes: 
    in_header: >
      <!-- This is for site analytics. -->
      <!-- 
      Include the domain in the URL reported in goatcounter's dashboard.
      This is needed to separate subdomains that would point to the same page name, e.g.
      "palaeoverse.palaeoverse.org/getting-started" and "rphylopic.palaeoverse.org/getting-started"

      https://goatcounter.com/help/domains
        -->
      <script>
          window.goatcounter = {
              path: function (p) { return location.host + p }
          }
      </script>

      <script data-goatcounter="https://palaeoverse.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

navbar:
  structure:
    left: [articles, reference, news]
    right: [search, palaeoverse, github]
  # We don't add "articles" in this "components" section because we want this to
  # be a dropdown with a custom vignette order.
  components:
    reference:
      text: Reference
      href: reference/index.html
      aria-label: Reference
    news:
      text: Changelog
      href: news/index.html
      aria-label: Changelog
    palaeoverse:
      icon: pkg-logo
      text: Palaeoverse
      aria-label: Palaeoverse
      menu:
        - text: palaeoverse
          href: https://palaeoverse.palaeoverse.org/
        - text: rmacrostrat
          href: https://rmacrostrat.palaeoverse.org/
        - text: rphylopic
          href: https://rphylopic.palaeoverse.org/
        - text: sepkoski
          href: https://sepkoski.palaeoverse.org/
